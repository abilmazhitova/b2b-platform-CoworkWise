
services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-coworkwise_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-coworkwise_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml:
    build:
      context: ./b2b-ml
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ml_models:/app/models_store
    environment:
      MODELS_DIR: /app/models_store
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./b2b-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-coworkwise_db}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-replace-in-production-min-32-chars}
      ALGORITHM: HS256
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      ML_SERVICE_URL: "http://ml:8001"
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    volumes:
      - ./b2b-backend/data:/app/data


  frontend:
    build:
      context: ./b2b-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ml_models:
